name: SoundTouch Pi
options:
  bundleIdPrefix: com.jeffevertse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

targets:
  SoundTouch Pi:
    type: application
    platform: iOS
    sources:
      - path: SoundTouch Pi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jeffevertse.soundtouchpi
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: SoundTouch Pi/App/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
