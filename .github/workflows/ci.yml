name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build (iOS Simulator, no signing)
        run: |
          xcodebuild \
            -project "SoundTouch Pi.xcodeproj" \
            -scheme "SoundTouch Pi" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
